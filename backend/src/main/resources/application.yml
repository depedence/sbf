spring:
  application:
    name: sbf

  datasource:
    url: jdbc:postgresql://localhost:5432/sbf_db
    username: sbf_user
    password: sbf_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true